<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkEase Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../public/css/style.css">
</head>
<body class="login-body">

    <div class="container py-5">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-body p-4 p-md-5">

                        <div class="text-center mb-4">
                            <!-- <div class="parking-icon mb-3"> -->
                                <img class="logo" src="../public/uploads/logo.png" alt="">
                            </div>
                            <h1 class="fw-bold text-primary mb-1">ParkEase</h1>
                            <p class="text-muted mb-0">Parking & Vehicle Services Management</p>
                        </div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold">Username</label>
                                <input type="text" class="form-control form-control-lg rounded-3" id="username" placeholder="Enter username">
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">Password</label>
                                <input type="password" class="form-control form-control-lg rounded-3" id="password" placeholder="Enter password" >
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 mt-2">
                                Login 
                            </button>
                            
                            <div class="text-center mt-3">
                                <a href="/signup" class="text-decoration-none">Don't have an account? Sign Up</a>
                            </div>
                        </form>                    

                        <footer class="text-center mt-4">
                            <small class="text-muted">2026 ParkEase Project</small>
                        </footer>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- <script src="../public/js/index.js"></script> -->
</body>
</html>
