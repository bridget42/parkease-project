<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Registration </title>
    
    <!-- Global styles (shared by all pages) -->
    <link rel="stylesheet" href="../public/css/style.css">
</head>
<body>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <h1 style="color: #00327d; text-align: center; margin-bottom: 40px;">ParkEase</h1>
        
        <a href="attendant-dashboard.html" class="nav-link"> Dashboard</a>
        <a href="sign-out.html" class="nav-link"> Sign Out</a>
        <a href="tyre-clinic.html" class="nav-link"> Tyre Clinic</a>
        <a href="battery-section.html" class="nav-link"> Battery</a>
        <a href="reports.html" class="nav-link"> Reports</a>
    </aside>

    <!-- Main Content Area -->
    <main style="margin-left: 280px; padding-top: 80px;">
        <div class="container">

            <!-- Page Title -->
            <h1>Register  Vehicle</h1>
            <p class="subtitle">Fill the form below to register a vehicle.</p>

            <!-- Registration Form -->
            <div class="form-card">
                <form action="/register-vehicle" method="POST" id="vehicleForm">
                    <!-- Row 1 -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="driverName">Driver Name</label>
                            <!-- Every line is commented so you can learn -->
                            <input 
                                type="text" 
                                id="driverName" 
                                name="driverName"
                                placeholder="e.g. Mukasa Ivan"
                                required>
                            <!-- Validation message will show here -->
                            <small class="error-msg" id="nameError"></small>
                        </div>

                        <div class="form-group">
                            <label for="vehicleType">Vehicle Type</label>
                            <select id="vehicleType" name="vehicleType" required>
                                <option value="">-- Select Type --</option>
                                <option value="Truck">Truck</option>
                                <option value="Personal Car">Personal Car</option>
                                <option value="Taxi">Taxi</option>
                                <option value="Coaster">Coaster</option>
                                <option value="Boda-boda">Boda-boda</option>
                            </select>
                        </div>
                    </div>

                    <!-- Row 2 -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="numberPlate">Number Plate</label>
                            <input 
                                type="text" 
                                id="numberPlate" 
                                name="plateNumber"
                                placeholder="e.g. UBA123"
                                maxlength="6"
                                required>
                            <small class="error-msg" id="plateError"></small>
                        </div>

                        <div class="form-group">
                            <label for="modelColor">Vehicle Model & Color</label>
                            <input 
                                type="text" 
                                id="modelColor" 
                                placeholder="e.g. Toyota Corolla, Silver">
                        </div>
                    </div>

                    <!-- Row 3 -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="phoneNumber">Phone Number</label>
                            <input 
                                type="tel" 
                                id="phoneNumber" 
                                name="phoneNumber"
                                placeholder="07XX XXX XXX"
                                required>
                            <small class="error-msg" id="phoneError"></small>
                        </div>

                        <div class="form-group">
                            <label for="ninNumber">NIN Number (Boda-boda only)</label>
                            <input 
                                type="text" 
                                id="ninNumber" 
                                placeholder="CF1234567890...">
                        </div>
                    </div>

                    <!-- Row 4 -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="parkingSlot">Parking Slot</label>
                            <input 
                                type="text" 
                                id="parkingSlot" 
                                name="parkingSlot"
                                placeholder="e.g. A1"
                                required>
                        </div>
                    </div>

                    <!-- Auto-filled Arrival Time -->
                    <div class="form-group">
                        <label>Arrival Time (Auto)</label>
                        <input type="text" id="entryTime" name="entryTime" readonly style="background:#f0f0f0;">
                    </div>

                    <!-- Action Buttons -->
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="window.history.back()">
                            Cancel
                        </button>
                        <button type="submit" class="btn btn-primary">
                            Register Vehicle & Print Receipt
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </main>

    <!-- Link to JavaScript file -->
    <script src="../public/js/vehicle-registration.js"></script>
</body>
</html>
