<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battery Section </title>
    
    <!-- Global CSS -->
    <link rel="stylesheet" href="../public/css/style.css">
    <!-- <link rel="stylesheet" href="./public/css/battery-section.css"> -->
</head>
<body>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <h1 style="color: #00327d; text-align: center; margin-bottom: 40px;">ParkEase</h1>
        
        <a href="attendant-dashboard.html" class="nav-link"> Dashboard</a>
        <a href="vehicle-registration.html" class="nav-link"> Register Vehicle</a>
        <a href="sign-out.html" class="nav-link"> Sign Out</a>
        <a href="tyre-clinic.html" class="nav-link"> Tyre Clinic</a>
        <a href="reports.html" class="nav-link"> Reports</a>
    </aside>

    <!-- Main Content -->
    <main style="margin-left: 280px; padding-top: 80px;">
        <div class="container">

            <h1>Battery Section</h1>
            <p class="subtitle">Record battery hire, sale or charging services.</p>

            <!-- New Transaction Form -->
            <div class="service-card">
                <form action="/battery-service" method="POST">

                    <div class="form-row">
                        <div class="form-group">
                            <label for="customerName">Customer Name</label>
                            <input type="text" id="customerName" placeholder="e.g. Sarah Nakato" required>
                        </div>
                        <div class="form-group">
                            <label for="phoneNumber">Phone Number</label>
                            <input type="tel" id="phoneNumber" placeholder="07XX XXX XXX" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="batteryModel">Battery Model</label>
                            <select id="batteryModel" required>
                                <option value="">-- Select Model --</option>
                                <option value="PowerMax 500">PowerMax 500</option>
                                <option value="VoltMaster X">VoltMaster X</option>
                                <option value="UltraCell 2.0">UltraCell 2.0</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="serviceType">Service Type</label>
                            <select id="serviceType" required>
                                <option value="">-- Select Type --</option>
                                <option value="Hire">Hire</option>
                                <option value="Sale">Sale</option>
                                <option value="Charging">Charging</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="price">Price (UGX)</label>
                        <input type="number" id="price" placeholder="Enter amount" required>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 25px;">
                        Record Battery Transaction
                    </button>
                </form>
            </div>

            <!-- Recent Battery Transactions -->
            <div class="recent-card">
                <h2>Recent Battery Transactions</h2>
                <div id="recentBattery" class="services-list">
                    <!-- JavaScript will add records here -->
                </div>
            </div>

        </div>
    </main>

    <!-- JavaScript -->
    <script src="../public/js/battery-section.js"></script>
</body>
</html>
